name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check skill frontmatter
        run: |
          FAIL=0
          for f in skills/*/SKILL.md; do
            if ! grep -q '^name:' "$f"; then echo "MISSING name: $f"; FAIL=1; fi
            if ! grep -q '^description:' "$f"; then echo "MISSING description: $f"; FAIL=1; fi
          done
          exit $FAIL

  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate catalog.json
        run: |
          node -e "
            var c = JSON.parse(require('fs').readFileSync('skills/catalog.json'));
            console.log('catalog total:', c.totalSkills);
            if (c.totalSkills !== c.skills.length) { process.exit(1); }
          "

  test-installer:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ide: [claude-code, antigravity, cursor, windsurf, copilot, continue, aider, codeium, zed, jetbrains, void]
    steps:
      - uses: actions/checkout@v4
      - name: Install ${{ matrix.ide }}
        run: |
          mkdir -p /tmp/test-install
          cd /tmp/test-install
          NC_SOURCE=$GITHUB_WORKSPACE bash $GITHUB_WORKSPACE/install.sh --ide=${{ matrix.ide }} --force
      - name: Verify files exist
        run: |
          find /tmp/test-install -name "*.md" | head -5
